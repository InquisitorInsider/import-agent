# import-agent — compose para OMV con las variables DENTRO del archivo.
# Pega esto en Services -> Compose -> Files -> Add (+), nómbralo import-agent.
# Rellena los valores marcados con  <<< .
#
# El puerto 8000 ya lo usa otro contenedor en tu OMV (igual que con print-agent),
# por eso aquí se publica en 8095:8000  ->  http://IP_OMV:8095
#
# Se conecta a la red 'pos-net' (la misma que print-agent / bot) para que el bot
# pueda llamarlo por http://import-agent:8000.

services:
  import-agent:
    image: ghcr.io/inquisitorinsider/import-agent:latest
    container_name: import-agent
    restart: unless-stopped
    pull_policy: always
    ports:
      - "8095:8000"
    environment:
      ADMIN_USER: "admin"
      ADMIN_PASSWORD: "CAMBIA-ESTA-CLAVE"        # <<< clave del panel
      LOOKUP_TOKEN: ""                           # <<< token opcional para el bot

      # --- Origen DBF (carpeta compartida en red) ---
      DBF_SOURCE_TYPE: "smb"
      SMB_HOST: "192.168.1.X"                    # <<< IP del PC con el sistema antiguo
      SMB_SHARE: "DATOS"                         # <<< recurso compartido
      SMB_PATH: ""                              # subcarpeta (si aplica)
      SMB_USER: ""                              # vacío si la comparte es abierta
      SMB_PASS: ""                              # <<< clave (si tiene)
      SMB_DOMAIN: "WORKGROUP"
      CLIENTES_FILE: "clientesdomicilio.dbf"
      DIRECCIONES_FILE: "direccionesdomicilio.dbf"

      DBF_ENCODING: "cp1252"
      PHONE_DIGITS: "9"
      COUNTRY_CODE: "51"

      # --- Sincronización con el bot (opcional) ---
      BOT_DB_PATH: "/bot/pedidos.db"
    volumes:
      - import-agent-data:/data
      # SQLite del bot, para el panel de sincronización. El bot guarda pedidos.db
      # en el volumen whatsapp-bot_db-data. Se monta aquí para comparar/corregir.
      - whatsapp-bot_db-data:/bot
    networks:
      - pos-net

networks:
  pos-net:
    name: pos-net
    external: true

volumes:
  import-agent-data:
    name: import-agent-data
  whatsapp-bot_db-data:
    name: whatsapp-bot_db-data
    external: true
